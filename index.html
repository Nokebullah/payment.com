<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff" id="theme-color-meta">

    <title>Garage Pay Pro</title>
    
    <!-- Website Logo added as Favicon -->
    <link rel="icon" type="image/png" href="logo-icon.png">
    <link rel="apple-touch-icon" href="logo-icon.png">
    <link rel="manifest" href="manifest.json">


    <!-- Professional Fintech Font: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        /* --- ULTRA-PROFESSIONAL THEME VARIABLES --- */
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --btn-grad: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --input-bg: #f1f5f9;
            --shadow-sm: 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-md: 0 8px 20px -3px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.08);
            --toast-bg: #1e293b;
            --delete-bg: #fef2f2;
            --delete-text: #ef4444;
            --note-bg: #eff6ff;
            --note-text: #1e40af;
            --success: #10b981;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        body.dark-theme {
            --bg: #020617;
            --surface: #0f172a;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --btn-grad: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --input-bg: #1e293b;
            --shadow-md: 0 8px 20px -3px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.5);
            --toast-bg: #ffffff;
            --toast-text: #0f172a;
            --delete-bg: rgba(239, 68, 68, 0.15);
            --delete-text: #f87171;
            --note-bg: #1e3a8a;
            --note-text: #bfdbfe;
        }

        /* --- RESET & TYPOGRAPHY --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; height: 100vh; overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
            color: var(--text-main);
        }

        .app {
            width: 100%; max-width: 480px; height: 100%; background: var(--bg);
            display: flex; flex-direction: column; position: relative;
            box-shadow: var(--shadow-lg); transition: background 0.4s ease;
        }

        /* --- HEADER --- */
        .header {
            padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); z-index: 10;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        body.dark-theme .header { background: rgba(15, 23, 42, 0.85); }
        
        .brand { display: flex; align-items: center; gap: 14px; }
        
        /* Updated to use logo-icon.png */
        .brand-logo {
            width: 46px; height: 46px; border-radius: 12px; object-fit: cover;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); background: var(--surface); padding: 4px;
            border: 1px solid var(--border);
        }
        
        .brand-name { font-size: 1.05rem; font-weight: 800; color: var(--text-main); line-height: 1.2; letter-spacing: -0.3px; transition: color 0.4s ease; }
        .brand-sub { font-size: 0.75rem; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .theme-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-sub); width: 42px; height: 42px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; cursor: pointer; transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .theme-btn:hover { color: var(--text-main); border-color: var(--text-sub); }
        .theme-btn:active { transform: scale(0.92); }

        /* --- CONTENT --- */
        .content { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; scroll-behavior: smooth; }
        
        .hero { margin-bottom: 28px; }
        .hero h1 { font-size: 1.5rem; color: var(--text-main); font-weight: 800; letter-spacing: -0.5px; transition: color 0.4s ease;}
        .hero p { color: var(--text-sub); margin: 4px 0 0 0; font-size: 0.9rem; font-weight: 500; }

        /* --- ITEM CARDS --- */
        #items-container { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        
        .item-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 18px; 
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: slideIn 0.3s ease forwards;
        }
        .item-card:focus-within { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
            transform: translateY(-2px); 
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-row-1 { display: flex; gap: 12px; margin-bottom: 14px; align-items: center; }
        .card-row-2 { display: flex; gap: 12px; align-items: center; }

        select, input {
            background: var(--input-bg); border: 1px solid transparent; border-radius: var(--radius-md);
            padding: 14px 16px; color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem; font-weight: 600; width: 100%; appearance: none; transition: 0.2s;
        }
        select:focus, input:focus { background: var(--surface); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .v-select { flex: 1; cursor: pointer; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 16px auto; padding-right: 40px; }
        .v-select option:disabled { color: #cbd5e1; font-style: italic; }

        .qty-box { position: relative; flex: 0.6; }
        .v-qty { padding-left: 48px; cursor: pointer; }
        .qty-label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-sub); font-size: 0.85rem; font-weight: 700; pointer-events: none; }

        .v-fine { flex: 1; }
        .v-fine::placeholder { color: var(--text-sub); opacity: 0.8; font-weight: 500; }
        
        .btn-remove {
            background: var(--delete-bg); color: var(--delete-text); border: none;
            width: 46px; height: 46px; border-radius: var(--radius-md); font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .btn-remove:hover { background: #fee2e2; }
        body.dark-theme .btn-remove:hover { background: #450a0a; }
        .btn-remove:active { transform: scale(0.95); background: var(--delete-text); color: white; }

        .btn-add-row {
            background: transparent; color: var(--primary);
            border: 1.5px dashed var(--border); width: 100%; padding: 16px;
            border-radius: var(--radius-lg); font-size: 0.95rem; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: all 0.2s; margin-bottom: 30px;
        }
        .btn-add-row:hover { border-color: var(--primary); background: rgba(37, 99, 235, 0.03); }
        .btn-add-row:active { transform: scale(0.98); }

        /* --- BUTTONS --- */
        .btn-main {
            width: 100%; padding: 18px; border-radius: var(--radius-lg); border: none;
            background: var(--btn-grad); color: white; font-size: 1.05rem; font-weight: 700; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); transition: all 0.2s;
        }
        .btn-main:hover { box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35); transform: translateY(-1px); }
        .btn-main:active { transform: scale(0.97); }

        /* --- HISTORY --- */
        .history-sec { margin-top: 40px; padding-bottom: 30px; }
        .h-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.8rem; font-weight: 800; color: var(--text-sub); letter-spacing: 1px; }
        .h-head span:last-child { padding: 6px 10px; border-radius: 8px; transition: 0.2s; }
        .h-head span:last-child:hover { background: var(--delete-bg); }
        
        .collection-summary {
            background: var(--surface); color: var(--text-main);
            padding: 16px 20px; border-radius: var(--radius-lg); font-weight: 700; font-size: 0.95rem;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
            transition: all 0.4s ease;
        }
        .collection-summary::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--success);
        }
        .summary-amt { font-size: 1.2rem; font-weight: 800; color: var(--success); }

        .h-item {
            background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius-lg);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; transition: 0.2s;
            box-shadow: var(--shadow-sm); cursor: pointer;
        }
        .h-item:hover { border-color: var(--text-sub); transform: translateX(2px); }
        .h-item:active { transform: scale(0.98); background: var(--input-bg); }
        .h-info { flex: 1; display: flex; flex-direction: column; }
        .h-amt { font-size: 1.15rem; font-weight: 800; color: var(--text-main); transition: color 0.4s ease;}
        .h-note { font-size: 0.8rem; color: var(--text-sub); font-weight: 500; margin-top: 4px; line-height: 1.4; }
        
        .btn-delete-single {
            background: transparent; color: var(--text-sub); border: none;
            width: 40px; height: 40px; border-radius: var(--radius-md); font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
            margin-left: 12px; flex-shrink: 0;
        }
        .btn-delete-single:hover { color: var(--delete-text); background: var(--delete-bg); }

        /* --- RECEIPT BOTTOM SHEET --- */
        .sheet-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 100; opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; justify-content: flex-end;
        }
        .sheet-overlay.active { opacity: 1; visibility: visible; }

        .sheet {
            background: var(--surface); width: 100%;
            border-top-left-radius: var(--radius-xl); border-top-right-radius: var(--radius-xl);
            padding: 30px 24px 40px 24px; text-align: center;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .sheet-overlay.active .sheet { transform: translateY(0); }

        .bar { width: 48px; height: 5px; background: var(--border); border-radius: 10px; margin: 0 auto 24px auto; }
        
        .receipt-header { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 2px dashed var(--border); }
        .receipt-label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .final-amt { font-size: 2.5rem; font-weight: 800; color: var(--text-main); margin: 0; line-height: 1; transition: color 0.4s ease;}
        
        .final-note { 
            background: var(--note-bg); color: var(--note-text); 
            padding: 10px 16px; border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 600; 
            margin: 16px auto 0 auto; display: inline-block; line-height: 1.4; text-align: left;
        }

        .qr-box {
            padding: 20px; background: #ffffff; border-radius: var(--radius-lg);
            display: inline-flex; justify-content: center; align-items: center; margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; min-height: 240px; min-width: 240px;
        }
        #qr-canvas { width: 200px; height: 200px; display: block; margin: 0 auto; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-act { padding: 16px; border-radius: var(--radius-md); border: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-act:active { transform: scale(0.96); }
        .btn-save { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); }
        .btn-save:hover { border-color: var(--text-sub); }
        .btn-share { background: #10b981; color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn-share:hover { background: #059669; }
        
        .btn-close { width: 100%; background: transparent; border: none; color: var(--text-sub); font-weight: 700; padding: 16px; margin-top: 12px; cursor: pointer; transition: color 0.2s; font-size: 0.95rem; }
        .btn-close:hover { color: var(--text-main); }

        #toast {
            visibility: hidden; min-width: 200px; background-color: var(--toast-bg);
            color: var(--surface); text-align: center; border-radius: 100px; padding: 14px 20px;
            position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
            font-weight: 600; font-size: 0.9rem; opacity: 0; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: var(--shadow-md);
        }
        body.dark-theme #toast { color: var(--toast-text); }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); bottom: 40px; }
    </style>
</head>
<body>

    <div id="toast">Notification</div>

    <div class="app">
        <div class="header">
            <div class="brand">
                <!-- User's Custom Website Logo inserted here -->
                <img src="logo-icon.png" class="brand-logo" alt="Garage Logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzI1NjNlYiI+PHBhdGggZD0iTTEyIDJMMiAxMmgydjhoOHYtNmg0djZoOHYtOGgyTDEyIDJ6Ii8+PC9zdmc+'">
                <div>
                    <div class="brand-name">Beauty Cycle</div>
                    <div class="brand-sub">Garage Pay Pro</div>
                </div>
            </div>
            <!-- Theme Toggle Button -->
            <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
                <i class="ri-moon-fill" id="moon-icon"></i>
                <i class="ri-sun-fill" id="sun-icon" style="display: none;"></i>
            </button>
        </div>

        <div class="content">
            <div class="hero">
                <h1>New Payment</h1>
                <p>Select services, set quantity & get UPI QR</p>
            </div>

            <div id="items-container">
                <!-- Items injected here -->
            </div>

            <button class="btn-add-row" id="add-btn" onclick="addRow()">
                <i class="ri-add-line" style="font-size:1.2rem;"></i> Add Another Vehicle
            </button>

            <button class="btn-main" onclick="handleGenerate()">
                Generate Payment QR <i class="ri-qr-code-line" style="font-size:1.2rem;"></i>
            </button>

            <div class="history-sec">
                <div class="h-head">
                    <span>RECENT TRANSACTIONS</span>
                    <span onclick="clearHistory()" style="color:var(--delete-text); cursor:pointer;"><i class="ri-delete-bin-line"></i> Clear</span>
                </div>
                <div id="history-list"></div>
            </div>
        </div>

        <!-- Receipt Bottom Sheet -->
        <div class="sheet-overlay" id="sheet" onclick="closeSheetOutside(event)">
            <div class="sheet" onclick="event.stopPropagation()">
                <div class="bar"></div>
                
                <div class="receipt-header">
                    <div class="receipt-label">Amount Payable</div>
                    <div class="final-amt" id="show-amt">₹0</div>
                    <div id="show-note" class="final-note"></div>
                </div>

                <div class="qr-box">
                    <div id="qr-canvas"></div>
                </div>

                <div class="actions">
                    <button class="btn-act btn-save" onclick="downloadQR()">
                        <i class="ri-download-2-line" style="font-size:1.2rem;"></i> Save
                    </button>
                    <button class="btn-act btn-share" onclick="shareQR()">
                        <i class="ri-share-forward-line" style="font-size:1.2rem;"></i> Share
                    </button>
                </div>
                <button class="btn-close" onclick="closeSheet()">Done & Reset Form</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const CONFIG = {
            upi: "Q97078055@ybl",
            name: "Molla Md Twahid",
            vehicles: [
                { name: "Cycle", price: 10 },
                { name: "Bike", price: 20 },
                { name: "Toto", price: 50 },
                { name: "4-Wheeler", price: 100 },
                { name: "Truck", price: 150 }
            ]
        };

        // --- GLOBAL QR INSTANCE ---
        // User's phonepe-logo.png added to the QR Code configuration
        let currentQR = new QRCodeStyling({
            width: 200, height: 200, 
            type: "svg", 
            image: "phonepe-logo.png", // ADDED BACK!
            dotsOptions: { color: "#1e3a8a", type: "rounded" }, 
            backgroundOptions: { color: "#ffffff" },
            imageOptions: { margin: 8, imageSize: 0.35, crossOrigin: "anonymous" },
            cornersSquareOptions: { type: "extra-rounded", color: "#2563eb" }, 
            cornersDotOptions: { type: "dot", color: "#1e3a8a" }
        });
        
        let isQrAppended = false;

        // Generate Qty Options (1 to 21)
        let qtyOptionsHTML = '';
        for(let i=1; i<=21; i++) {
            qtyOptionsHTML += `<option value="${i}">${i}</option>`;
        }

        window.onload = function() {
            initTheme();
            renderHistory();
            addRow(); 
        };

        // --- THEME LOGIC ---
        function initTheme() {
            const savedTheme = localStorage.getItem('garage_v4_theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark-theme');
                document.getElementById('moon-icon').style.display = 'none';
                document.getElementById('sun-icon').style.display = 'block';
                document.getElementById('theme-color-meta').content = "#0f172a";
            } else {
                document.getElementById('theme-color-meta').content = "#ffffff";
            }
        }

        function toggleTheme() {
            vibrate();
            const body = document.body;
            const isDark = body.classList.toggle('dark-theme');
            
            // Save preference
            localStorage.setItem('garage_v4_theme', isDark ? 'dark' : 'light');
            
            // Toggle Icons
            document.getElementById('moon-icon').style.display = isDark ? 'none' : 'block';
            document.getElementById('sun-icon').style.display = isDark ? 'block' : 'none';
            
            // Update Meta Theme Color for mobile browsers
            document.getElementById('theme-color-meta').content = isDark ? "#0f172a" : "#ffffff";
        }

        // --- SMART DROPDOWN LOGIC ---
        function updateDropdownStates() {
            const allSelects = document.querySelectorAll('.v-select');
            const selectedNames = Array.from(allSelects).map(select => {
                return select.options[select.selectedIndex].getAttribute('data-name');
            });

            allSelects.forEach(select => {
                const currentVal = select.options[select.selectedIndex].getAttribute('data-name');
                
                Array.from(select.options).forEach(option => {
                    const optName = option.getAttribute('data-name');
                    if (selectedNames.includes(optName) && optName !== currentVal) {
                        option.disabled = true; 
                    } else {
                        option.disabled = false; 
                    }
                });
            });

            const addBtn = document.getElementById('add-btn');
            if (allSelects.length >= CONFIG.vehicles.length) {
                addBtn.style.display = 'none';
            } else {
                addBtn.style.display = 'flex';
            }
        }

        // --- DYNAMIC CARDS ---
        function addRow() {
            vibrate();
            const container = document.getElementById('items-container');
            const currentSelects = document.querySelectorAll('.v-select');
            
            if (currentSelects.length >= CONFIG.vehicles.length) {
                showToast("All vehicle types added.");
                return;
            }

            const selectedNames = Array.from(currentSelects).map(s => s.options[s.selectedIndex].getAttribute('data-name'));
            const nextAvailableVehicle = CONFIG.vehicles.find(v => !selectedNames.includes(v.name));

            const card = document.createElement('div');
            card.className = 'item-card';
            
            let vehicleOptionsHTML = CONFIG.vehicles.map(v => {
                const isSelected = nextAvailableVehicle && v.name === nextAvailableVehicle.name ? 'selected' : '';
                return `<option value="${v.price}" data-name="${v.name}" ${isSelected}>${v.name} (₹${v.price})</option>`;
            }).join('');
            
            card.innerHTML = `
                <div class="card-row-1">
                    <select class="v-select" onchange="updateDropdownStates()">${vehicleOptionsHTML}</select>
                    <button class="btn-remove" onclick="removeRow(this)" style="display:none;" aria-label="Remove item">
                        <i class="ri-close-line"></i>
                    </button>
                </div>
                <div class="card-row-2">
                    <div class="qty-box">
                        <span class="qty-label">Qty</span>
                        <select class="v-qty">${qtyOptionsHTML}</select>
                    </div>
                    <input type="number" class="v-fine" placeholder="+ Fine (₹)" inputmode="numeric">
                </div>
            `;
            container.appendChild(card);
            
            updateDropdownStates();
            
            if (container.children.length > 1) {
                container.children[0].querySelector('.btn-remove').style.display = 'flex';
            }
            card.querySelector('.btn-remove').style.display = 'flex';
            
            // Auto scroll to bottom smoothly
            setTimeout(() => {
                document.querySelector('.content').scrollTo({
                    top: document.querySelector('.content').scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        function removeRow(btn) {
            vibrate();
            const container = document.getElementById('items-container');
            if (container.children.length > 1) {
                const card = btn.closest('.item-card');
                card.style.opacity = '0';
                card.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    card.remove();
                    updateDropdownStates();
                    if (container.children.length === 1) {
                        container.children[0].querySelector('.btn-remove').style.display = 'none';
                    }
                }, 200);
            }
        }

        // --- CALCULATION & QR GENERATE ---
        function handleGenerate() {
            vibrate();
            let totalAmount = 0;
            let noteParts = [];
            
            const cards = document.querySelectorAll('.item-card');
            cards.forEach(card => {
                const select = card.querySelector('.v-select');
                const price = parseFloat(select.value) || 0;
                const name = select.options[select.selectedIndex].getAttribute('data-name');
                
                const qty = parseInt(card.querySelector('.v-qty').value) || 1;
                
                const fineInput = card.querySelector('.v-fine').value;
                const fine = parseFloat(fineInput) > 0 ? parseFloat(fineInput) : 0;
                
                const itemBaseTotal = price * qty;
                totalAmount += (itemBaseTotal + fine);
                
                let part = `${qty > 1 ? qty + 'x ' : ''}${name}`;
                if (fine > 0) part += `+₹${fine} fine`;
                noteParts.push(part);
            });

            if (totalAmount <= 0) {
                showToast("Please enter a valid amount.");
                return;
            }

            const finalNote = noteParts.join(', ');
            saveHistory(totalAmount, finalNote);
            openSheet(totalAmount, finalNote);
        }

        function openSheet(amt, note) {
            document.getElementById('show-amt').innerText = "₹" + amt;
            const noteEl = document.getElementById('show-note');
            
            if(note) { 
                noteEl.innerText = note; 
                noteEl.style.display = 'inline-block'; 
            } else { 
                noteEl.style.display = 'none'; 
            }

            let url = `upi://pay?pa=${CONFIG.upi}&pn=${encodeURIComponent(CONFIG.name)}&am=${amt}&cu=INR&tn=${encodeURIComponent(note)}`;

            currentQR.update({ data: url });

            if (!isQrAppended) {
                const container = document.getElementById('qr-canvas');
                container.innerHTML = "";
                currentQR.append(container);
                isQrAppended = true;
            }

            document.getElementById('sheet').classList.add('active');
        }

        function closeSheet() {
            vibrate();
            document.getElementById('sheet').classList.remove('active');
            setTimeout(() => {
                document.getElementById('items-container').innerHTML = '';
                addRow(); 
            }, 300);
        }

        function closeSheetOutside(event) {
            if(event.target.id === 'sheet') {
                closeSheet();
            }
        }

        // --- DOWNLOAD & SHARE ---
        function downloadQR() {
            vibrate();
            if(currentQR) {
                currentQR.download({ name: `GaragePay_${Date.now()}`, extension: "png" });
                showToast("QR Saved to Device");
            }
        }

        async function shareQR() {
            vibrate();
            if(!currentQR) return;
            
            const amt = document.getElementById('show-amt').innerText;
            const note = document.getElementById('show-note').innerText;
            const text = `*Payment Request*\nTo: ${CONFIG.name}\nAmount: ${amt}\nDetails: ${note}\n\nPay securely via any UPI app.`;

            if (navigator.share) {
                try {
                    const blob = await currentQR.getRawData("png");
                    const file = new File([blob], "payment_qr.png", { type: "image/png" });
                    await navigator.share({ title: 'Pay Garage', text: text, files: [file] });
                } catch (err) {
                    window.location.href = `whatsapp://send?text=${encodeURIComponent(text)}`;
                }
            } else {
                window.location.href = `whatsapp://send?text=${encodeURIComponent(text)}`;
            }
        }

        // --- HISTORY & SINGLE DELETE ---
        function saveHistory(amt, msg) {
            let hist = JSON.parse(localStorage.getItem('garage_v4_hist')) || [];
            const date = new Date().toLocaleDateString('en-IN', {day:'numeric', month:'short'});
            
            if (hist.length > 0 && hist[0].amt === amt && hist[0].msg === msg) {
                return; 
            }

            hist.unshift({ amt, msg, date });
            if(hist.length > 800) hist.pop(); // Keep up to 800 records
            localStorage.setItem('garage_v4_hist', JSON.stringify(hist));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            let hist = JSON.parse(localStorage.getItem('garage_v4_hist')) || [];
            list.innerHTML = "";

            if(hist.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:var(--text-sub); margin-top:20px; font-size: 0.9rem;">No recent transactions</div>';
                return;
            }

            let totalCollection = 0; 

            hist.forEach((item, index) => {
                totalCollection += parseFloat(item.amt); 
                
                const div = document.createElement('div');
                div.className = 'h-item';
                div.innerHTML = `
                    <div class="h-info" onclick="openSheet(${item.amt}, '${item.msg}')">
                        <span class="h-amt">₹${item.amt}</span>
                        <span class="h-note">${item.date} • ${item.msg}</span>
                    </div>
                    <button class="btn-delete-single" onclick="deleteSingleRecord(${index}, event)" title="Delete record">
                        <i class="ri-delete-bin-line"></i>
                    </button>
                `;
                list.appendChild(div);
            });

            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'collection-summary';
            summaryDiv.innerHTML = `
                <span style="display:flex; align-items:center; gap:8px;">
                    <i class="ri-wallet-3-line" style="font-size:1.2rem; color:var(--success);"></i> Total Collection
                </span> 
                <span class="summary-amt">₹${totalCollection.toLocaleString('en-IN')}</span>
            `;
            list.prepend(summaryDiv);
        }

        function deleteSingleRecord(index, event) {
            event.stopPropagation(); 
            vibrate();
            if(confirm("Delete this transaction record?")) {
                let hist = JSON.parse(localStorage.getItem('garage_v4_hist'));
                hist.splice(index, 1);
                localStorage.setItem('garage_v4_hist', JSON.stringify(hist));
                renderHistory();
                showToast("Record deleted");
            }
        }

        function clearHistory() {
            vibrate();
            if(confirm("Are you sure you want to clear ALL payment history?")) {
                localStorage.removeItem('garage_v4_hist');
                renderHistory();
                showToast("All history cleared");
            }
        }

        // --- UTILS ---
        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 2500);
        }

        function vibrate() {
            if (navigator.vibrate) navigator.vibrate(10);
        }

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker
      .register("sw.js")
      .then(res => console.log("Service worker registered!"))
      .catch(err => console.log("Service worker not registered", err));
  });
}


    </script>
</body>
